server:
  port: 8083

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: product-service
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/v1/api/products/**
            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/v1/api/orders/**
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/v1/api/users/**
            - id: payment-service
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/v1/api/payments/**
            - id: inventory-service
              uri: lb://INVENTORY-SERVICE
              predicates:
                - Path=/v1/api/inventory/**



eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    hostname: api-gateway