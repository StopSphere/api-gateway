server:
  port: 8083

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/v1/api/products/**
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/v1/api/orders/**
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/v1/api/users/**


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    hostname: localhost